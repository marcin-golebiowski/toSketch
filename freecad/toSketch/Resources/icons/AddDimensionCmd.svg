<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Line being dimensioned -->
  <line x1="8" y1="40" x2="56" y2="40" stroke="#3465a4" stroke-width="4" stroke-linecap="round"/>
  <!-- Dimension arrows -->
  <line x1="8" y1="24" x2="56" y2="24" stroke="#cc0000" stroke-width="2"/>
  <!-- Arrow heads -->
  <polygon points="8,24 14,20 14,28" fill="#cc0000"/>
  <polygon points="56,24 50,20 50,28" fill="#cc0000"/>
  <!-- Extension lines -->
  <line x1="8" y1="38" x2="8" y2="22" stroke="#888888" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="56" y1="38" x2="56" y2="22" stroke="#888888" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Dimension text -->
  <text x="32" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#cc0000">L</text>
</svg>
