<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Two lines meeting at a point -->
  <line x1="8" y1="12" x2="32" y2="32" stroke="#3465a4" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="56" y2="16" stroke="#3465a4" stroke-width="3" stroke-linecap="round"/>
  <!-- Coincident point -->
  <circle cx="32" cy="32" r="5" fill="#cc0000"/>
  <!-- Check mark -->
  <polyline points="20,48 28,56 44,40" fill="none" stroke="#4e9a06" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
