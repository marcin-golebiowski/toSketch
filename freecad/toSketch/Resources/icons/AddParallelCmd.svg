<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Two parallel lines -->
  <line x1="10" y1="14" x2="46" y2="14" stroke="#3465a4" stroke-width="4" stroke-linecap="round"/>
  <line x1="10" y1="34" x2="46" y2="34" stroke="#3465a4" stroke-width="4" stroke-linecap="round"/>
  <!-- Parallel symbol (arrows) -->
  <line x1="52" y1="10" x2="52" y2="38" stroke="#cc0000" stroke-width="2" stroke-linecap="round"/>
  <polyline points="48,16 52,10 56,16" fill="none" stroke="#cc0000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="48,32 52,38 56,32" fill="none" stroke="#cc0000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Plus sign -->
  <line x1="24" y1="48" x2="24" y2="58" stroke="#4e9a06" stroke-width="3" stroke-linecap="round"/>
  <line x1="19" y1="53" x2="29" y2="53" stroke="#4e9a06" stroke-width="3" stroke-linecap="round"/>
</svg>
